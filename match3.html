<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Резонанс · Нейро × Solfeggio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;overflow:hidden;touch-action:none;font-family:'Inter',sans-serif;}
canvas{display:block;position:fixed;inset:0;z-index:2;}
.overlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,15,0.96);transition:opacity .6s ease;}
.overlay.gone{opacity:0;pointer-events:none;}
.serif{font-family:'Cormorant Garamond',serif;}
.ghost-btn{border:1px solid rgba(255,255,255,0.16);background:transparent;color:rgba(255,255,255,0.55);letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:all .4s;font-family:'Inter',sans-serif;padding:14px 44px;font-size:11px;margin:5px 0;}
.ghost-btn:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.32);letter-spacing:6px;color:rgba(255,255,255,0.88);}
.ghost-btn.hi{border-color:rgba(255,255,255,0.26);color:rgba(255,255,255,0.72);font-size:12px;letter-spacing:6px;padding:16px 52px;margin-bottom:10px;}
.hublink{position:fixed;top:14px;left:16px;z-index:10;border:1px solid rgba(255,255,255,0.07);border-radius:20px;background:rgba(10,10,15,0.55);color:rgba(255,255,255,0.22);font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;cursor:pointer;transition:all .3s;text-decoration:none;font-family:'Inter',sans-serif;}
.hublink:hover{color:rgba(255,255,255,0.55);border-color:rgba(255,255,255,0.16);}
.particle{position:fixed;border-radius:50%;pointer-events:none;z-index:1;width:1px;height:1px;background:rgba(255,255,255,0.28);animation:rise linear infinite;}
@keyframes rise{0%{transform:translateY(0) translateX(0);opacity:0}5%{opacity:1}90%{opacity:.25}100%{transform:translateY(-100vh) translateX(var(--dx,0px));opacity:0}}
</style>
</head>
<body>

<div class="overlay" id="oStart">
  <div style="text-align:center;margin-bottom:44px">
    <h1 class="serif" style="font-size:clamp(28px,6vw,50px);color:rgba(255,255,255,0.72);letter-spacing:.14em;font-weight:300;margin-bottom:10px">Резонанс</h1>
    <p class="serif" style="font-size:clamp(11px,2.4vw,16px);color:rgba(255,255,255,0.2);letter-spacing:.3em;font-style:italic">Нейро × Solfeggio</p>
    <p style="font-size:9px;color:rgba(255,255,255,0.1);letter-spacing:3px;margin-top:16px;text-transform:uppercase">Совмести 3 одинаковых кода · чем больше код — тем крупнее фигура</p>
  </div>
  <button class="ghost-btn hi" onclick="startGame()">Войти в частоту</button>
</div>

<div class="overlay gone" id="oGameover">
  <p style="font-size:8px;color:rgba(255,255,255,0.16);letter-spacing:5px;text-transform:uppercase;margin-bottom:14px">Ходов не осталось</p>
  <h2 class="serif" style="font-size:clamp(30px,7vw,52px);color:rgba(255,255,255,0.6);letter-spacing:.12em;font-weight:300;margin-bottom:10px">Тишина</h2>
  <p class="serif" id="goScore" style="font-size:clamp(16px,3.5vw,24px);color:rgba(255,255,255,0.28);letter-spacing:4px;font-style:italic;margin-bottom:6px"></p>
  <p id="goHi" style="font-size:9px;color:rgba(255,255,255,0.13);letter-spacing:3px;margin-bottom:36px"></p>
  <button class="ghost-btn hi" onclick="startGame()">Снова</button>
  <button class="ghost-btn" style="font-size:9px;letter-spacing:3px;padding:9px 30px;margin-top:4px" onclick="goStart()">← Меню</button>
</div>

<a class="hublink" href="hub.html">← игры</a>
<canvas id="c"></canvas>

<script>
'use strict';

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    const R=Array.isArray(r)?r[0]||0:r||0;
    this.moveTo(x+R,y);this.lineTo(x+w-R,y);this.arcTo(x+w,y,x+w,y+R,R);
    this.lineTo(x+w,y+h-R);this.arcTo(x+w,y+h,x+w-R,y+h,R);
    this.lineTo(x+R,y+h);this.arcTo(x,y+h,x,y+h-R,R);
    this.lineTo(x,y+R);this.arcTo(x,y,x+R,y,R);this.closePath();
  };
}

// ── data ─────────────────────────────────────────────────────────────────
const GROUPS={1:['И','С','Э'],2:['А','Й','П','Т'],3:['Б','З','М','Ю'],4:['В','К','Ф','Я'],5:['Д','Л','Х','Ы'],6:['Е','О','Ц','Ь'],7:['Ё','Н','Ъ'],8:['Г','У','Ч','Щ'],9:['Ж','Р','Ш']};
const CLR={1:'#ff5f5f',2:'#ffd700',3:'#2ecc71',4:'#1ab8b8',5:'#4d88ff',6:'#7dce82',7:'#cccccc',8:'#ff4d8f',9:'#9b59b6'};
const SOL={1:{hz:174},2:{hz:285},3:{hz:369},4:{hz:417},5:{hz:528},6:{hz:639},7:{hz:741},8:{hz:852},9:{hz:963}};
const INFO={};
for(const[c,arr]of Object.entries(GROUPS))arr.forEach((l,i)=>INFO[l]={code:+c,si:i%4});
function ca(hex,a){return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a.toFixed(3)})`;}

// ── canvas ────────────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
const GCOLS=6,GROWS=8;
let CELL,GX,GY,HUD_T;

function resize(){
  W=canvas.width=innerWidth; H=canvas.height=innerHeight;
  HUD_T=Math.max(60,H*0.09);
  const avW=W-12, avH=H-HUD_T-Math.max(48,H*0.07)-8;
  CELL=Math.max(28,Math.min(76,Math.floor(Math.min(avW/GCOLS,avH/GROWS))));
  GX=Math.floor((W-GCOLS*CELL)/2);
  GY=Math.floor(HUD_T+(H-HUD_T-Math.max(48,H*0.07)-GROWS*CELL)/2);
}
window.addEventListener('resize',resize);
resize();

// ── audio ─────────────────────────────────────────────────────────────────
let AC=null;
function initAudio(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}
function playTone(code,dur=1.2){
  if(!AC)return;
  const hz=SOL[code].hz;
  [[1,0.16],[2,0.045]].forEach(([m,v])=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';o.frequency.value=hz*m;
    const t=AC.currentTime;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+0.22);
    g.gain.setValueAtTime(v,t+dur-0.28);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+dur);
  });
}
function playFail(){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(130,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(55,AC.currentTime+0.18);
  g.gain.setValueAtTime(0.09,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.2);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.22);
}

// ── grid ──────────────────────────────────────────────────────────────────
let grid=[];          // [r][c] = {code,letter,si} | null
let fallOff=[];       // [r][c] = pixel offset upward (lerps → 0 during fall phase)

function mkCell(code){
  code=code||Math.ceil(Math.random()*9);
  const arr=GROUPS[code];
  const l=arr[Math.floor(Math.random()*arr.length)];
  return {code,letter:l,si:INFO[l].si};
}

function wouldMatch3(r,c,code){
  if(c>=2&&grid[r][c-1]?.code===code&&grid[r][c-2]?.code===code)return true;
  if(r>=2&&grid[r-1]?.[c]?.code===code&&grid[r-2]?.[c]?.code===code)return true;
  return false;
}

function initGrid(){
  grid=Array.from({length:GROWS},()=>Array(GCOLS).fill(null));
  fallOff=Array.from({length:GROWS},()=>Array(GCOLS).fill(0));
  for(let r=0;r<GROWS;r++)
    for(let c=0;c<GCOLS;c++){
      let cell;
      do{cell=mkCell();}while(wouldMatch3(r,c,cell.code));
      grid[r][c]=cell;
    }
}

function findMatches(){
  const m=new Set();
  for(let r=0;r<GROWS;r++){let run=1;for(let c=1;c<=GCOLS;c++){const same=c<GCOLS&&grid[r][c]&&grid[r][c-1]&&grid[r][c].code===grid[r][c-1].code;if(same)run++;else{if(run>=3)for(let k=c-run;k<c;k++)m.add(r*GCOLS+k);run=1;}}}
  for(let c=0;c<GCOLS;c++){let run=1;for(let r=1;r<=GROWS;r++){const same=r<GROWS&&grid[r][c]&&grid[r-1][c]&&grid[r][c].code===grid[r-1][c].code;if(same)run++;else{if(run>=3)for(let k=r-run;k<r;k++)m.add(k*GCOLS+c);run=1;}}}
  return m;
}

function applyGravity(){
  fallOff=Array.from({length:GROWS},()=>Array(GCOLS).fill(0));
  for(let c=0;c<GCOLS;c++){
    const cells=[];
    for(let r=GROWS-1;r>=0;r--)if(grid[r][c])cells.push({cell:grid[r][c],fromR:r});
    for(let i=0;i<cells.length;i++){
      const toR=GROWS-1-i;
      grid[toR][c]=cells[i].cell;
      fallOff[toR][c]=(cells[i].fromR-toR)*CELL;
    }
    for(let r=GROWS-1-cells.length;r>=0;r--)grid[r][c]=null;
  }
}

function spawnNew(){
  for(let r=0;r<GROWS;r++)
    for(let c=0;c<GCOLS;c++)
      if(!grid[r][c]){
        grid[r][c]=mkCell();
        fallOff[r][c]=-(r+1)*CELL;
      }
}

function swapCells(r1,c1,r2,c2){[grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];}

function hasAnyMove(){
  for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++){
    if(c+1<GCOLS){swapCells(r,c,r,c+1);const ok=findMatches().size>0;swapCells(r,c,r,c+1);if(ok)return true;}
    if(r+1<GROWS){swapCells(r,c,r+1,c);const ok=findMatches().size>0;swapCells(r,c,r+1,c);if(ok)return true;}
  }
  return false;
}

// ── state ─────────────────────────────────────────────────────────────────
let score=0,hi=+localStorage.getItem('res3_hi')||0,shuffles=3;
let active=false;
let selected=null;
let phase='idle'; // idle | popping | falling | nomoves
let phaseT=0,phaseDur=1,prevTs=0;
let popSet=new Set();
let chain=1;
let popups=[];
let warnT=0; // invalid swap flash timer
let animId=0;

function addPopup(x,y,txt,col){popups.push({x,y,txt,col,alpha:1,vy:-44});}

// ── phase transitions ─────────────────────────────────────────────────────
function startPop(matches){
  popSet=matches;
  phase='popping'; phaseT=0; phaseDur=0.26;
  let pts=0;
  const codes=new Set();
  matches.forEach(key=>{const r=Math.floor(key/GCOLS),c=key%GCOLS;if(grid[r][c]){pts+=grid[r][c].code*8;codes.add(grid[r][c].code);}});
  pts=Math.round(pts*chain);
  score+=pts; if(score>hi){hi=score;localStorage.setItem('res3_hi',hi);}
  let sr=0,sc=0,n=0;
  matches.forEach(key=>{sr+=Math.floor(key/GCOLS);sc+=key%GCOLS;n++;});
  addPopup(GX+(sc/n+0.5)*CELL,GY+(sr/n)*CELL,`+${pts}`,chain>1?'#ffd700':'rgba(255,255,255,0.85)');
  if(chain>1)addPopup(GX+(sc/n+0.5)*CELL,GY+(sr/n)*CELL+22,`×${chain}серия`,'rgba(255,200,50,0.7)');
  codes.forEach(code=>setTimeout(()=>playTone(code,0.55),20));
}

function finishPop(){
  popSet.forEach(key=>{const r=Math.floor(key/GCOLS),c=key%GCOLS;grid[r][c]=null;});
  popSet=new Set();
  applyGravity();
  spawnNew();
  chain++;
  phase='falling'; phaseT=0; phaseDur=0.30;
}

function finishFall(){
  const m=findMatches();
  if(m.size>0){startPop(m);}
  else{
    chain=1;
    if(!hasAnyMove()){
      if(shuffles<=0){setTimeout(gameOver,400);}
      else{phase='nomoves';}
    } else {
      phase='idle';
    }
  }
}

// ── input ─────────────────────────────────────────────────────────────────
let ptDown=null;
canvas.addEventListener('pointerdown',e=>{e.preventDefault();ptDown={x:e.clientX,y:e.clientY};},{passive:false});
canvas.addEventListener('pointerup',e=>{
  e.preventDefault();
  if(!ptDown||!active)return;
  const ox=ptDown.x,oy=ptDown.y,ux=e.clientX,uy=e.clientY;
  ptDown=null;
  const dx=ux-ox,dy=uy-oy,dist=Math.hypot(dx,dy);

  if(phase==='nomoves'){
    // Shuffle button area
    const bx=W/2-68,by=GY+GROWS*CELL/2+2,bw=136,bh=38;
    if(ox>=bx&&ox<=bx+bw&&oy>=by&&oy<=by+bh) doShuffle();
    return;
  }
  if(phase!=='idle')return;

  const gc=Math.floor((ox-GX)/CELL),gr=Math.floor((oy-GY)/CELL);
  if(gr<0||gr>=GROWS||gc<0||gc>=GCOLS)return;

  if(dist>14){
    // Swipe: determine direction
    let dr=0,dc=0;
    if(Math.abs(dx)>=Math.abs(dy))dc=dx>0?1:-1; else dr=dy>0?1:-1;
    trySwap(gr,gc,gr+dr,gc+dc);
    selected=null;
  } else {
    // Tap
    if(!selected){selected={r:gr,c:gc};}
    else if(selected.r===gr&&selected.c===gc){selected=null;}
    else if(Math.abs(selected.r-gr)+Math.abs(selected.c-gc)===1){
      trySwap(selected.r,selected.c,gr,gc);
      selected=null;
    } else {
      selected={r:gr,c:gc};
    }
  }
},{passive:false});

function trySwap(r1,c1,r2,c2){
  if(r2<0||r2>=GROWS||c2<0||c2>=GCOLS){warnT=0.35;return;}
  initAudio();
  swapCells(r1,c1,r2,c2);
  const m=findMatches();
  if(m.size>0){startPop(m);}
  else{swapCells(r1,c1,r2,c2);playFail();warnT=0.35;}
}

function doShuffle(){
  if(shuffles<=0||phase!=='nomoves')return;
  initAudio(); shuffles--;
  const cells=[];
  for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++)if(grid[r][c])cells.push(grid[r][c]);
  for(let i=cells.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cells[i],cells[j]]=[cells[j],cells[i]];}
  let idx=0;
  for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++)if(grid[r][c])grid[r][c]=cells[idx++];
  fallOff=Array.from({length:GROWS},()=>Array(GCOLS).fill(0));
  const m=findMatches();
  if(m.size>0){chain=1;startPop(m);}
  else if(!hasAnyMove()){
    if(shuffles<=0)setTimeout(gameOver,500); else phase='nomoves';
  } else {phase='idle';}
}

// ── game control ──────────────────────────────────────────────────────────
function startGame(){
  initAudio(); score=0; shuffles=3; chain=1;
  selected=null; popups=[]; popSet=new Set(); warnT=0;
  initGrid();
  phase='idle'; phaseT=0;
  active=true;
  document.getElementById('oStart').classList.add('gone');
  document.getElementById('oGameover').classList.add('gone');
  prevTs=performance.now();
  if(animId)cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function gameOver(){
  active=false;
  if(animId)cancelAnimationFrame(animId);
  document.getElementById('goScore').textContent=`${score} очков`;
  document.getElementById('goHi').textContent=`Рекорд: ${hi}`;
  document.getElementById('oGameover').classList.remove('gone');
}

function goStart(){
  active=false;
  if(animId)cancelAnimationFrame(animId);
  document.getElementById('oGameover').classList.add('gone');
  document.getElementById('oStart').classList.remove('gone');
}

// ── loop ──────────────────────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min((ts-prevTs)/1000,0.05); prevTs=ts;
  if(warnT>0)warnT=Math.max(0,warnT-dt);

  if(phase==='popping'||phase==='falling'){
    phaseT=Math.min(1,phaseT+dt/phaseDur);
    if(phaseT>=1){
      if(phase==='popping')finishPop();
      else if(phase==='falling')finishFall();
    }
  }

  draw(dt);
  if(active)animId=requestAnimationFrame(loop);
}

// ── drawing ───────────────────────────────────────────────────────────────
function easeOut(t){return 1-(1-t)*(1-t);}

function drawGrid(){
  const isPopping=phase==='popping';
  const isFalling=phase==='falling';
  const fe=isFalling?easeOut(phaseT):1;

  for(let r=0;r<GROWS;r++){
    for(let c=0;c<GCOLS;c++){
      const cell=grid[r][c];
      const key=r*GCOLS+c;

      // Draw empty slot
      const sx=GX+c*CELL, sy=GY+r*CELL;
      ctx.beginPath(); ctx.roundRect(sx+1,sy+1,CELL-2,CELL-2,5);
      ctx.fillStyle='rgba(255,255,255,0.025)'; ctx.fill();

      if(!cell)continue;

      const isPopped=popSet.has(key);
      const isSel=selected&&selected.r===r&&selected.c===c;

      // Visual position with fall offset
      let vx=sx+CELL/2, vy=sy+CELL/2;
      if(isFalling&&fallOff[r][c]!==0) vy+=fallOff[r][c]*(1-fe);

      // Clip to avoid drawing outside grid during fall animation
      if(vy<GY-CELL||vy>GY+GROWS*CELL+CELL)continue;

      // Pop scale
      let scale=1;
      if(isPopped) scale=Math.max(0,1-easeOut(phaseT));

      const col=CLR[cell.code];
      // shape radius: grows with code
      const rs=CELL*(0.19+(cell.code-1)/8*0.24);

      ctx.save();
      ctx.translate(vx,vy);
      if(scale<1)ctx.scale(scale,scale);

      // Outer square tile
      ctx.beginPath(); ctx.roundRect(-CELL/2+1,-CELL/2+1,CELL-2,CELL-2,5);
      ctx.fillStyle=isPopped?ca(col,0.35):ca(col,0.07);
      ctx.fill();
      if(isSel){ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=2;}
      else{ctx.strokeStyle=isPopped?ca(col,0.85):ca(col,0.22);ctx.lineWidth=isPopped?2:1;}
      ctx.stroke();

      // Shape
      ctx.beginPath();
      if(cell.si===0){ctx.arc(0,0,rs,0,Math.PI*2);}
      else if(cell.si===1){ctx.roundRect(-rs,-rs,rs*2,rs*2,rs*0.26);}
      else if(cell.si===2){ctx.moveTo(0,-rs);ctx.lineTo(rs*.88,rs*.62);ctx.lineTo(-rs*.88,rs*.62);ctx.closePath();}
      else{ctx.moveTo(0,-rs);ctx.lineTo(rs*.72,0);ctx.lineTo(0,rs);ctx.lineTo(-rs*.72,0);ctx.closePath();}
      ctx.fillStyle=isPopped?'#ffffff':col+'cc';
      ctx.fill();
      ctx.strokeStyle=isPopped?'rgba(255,255,100,0.9)':'rgba(255,255,255,0.28)';
      ctx.lineWidth=isPopped?2.5:1;
      ctx.stroke();

      // Letter
      const fs=Math.max(7,rs*0.86);
      ctx.font=`bold ${fs}px monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillText(cell.letter,1,1);
      ctx.fillStyle=isPopped?'#000':'#fff'; ctx.fillText(cell.letter,0,0);

      // Code digit (corner)
      if(CELL>=34){
        const nfs=Math.max(6,rs*0.42);
        ctx.font=`bold ${nfs}px monospace`;
        ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillText(String(cell.code),rs*.4+.5,rs*.4+.5);
        ctx.fillStyle=isPopped?'#000':'rgba(255,255,255,0.85)'; ctx.fillText(String(cell.code),rs*.4,rs*.4);
      }

      ctx.restore();
    }
  }

  // No-moves overlay
  if(phase==='nomoves'){
    ctx.fillStyle='rgba(10,10,15,0.52)';
    ctx.fillRect(GX,GY,GCOLS*CELL,GROWS*CELL);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`300 ${Math.min(19,CELL*0.38)}px 'Cormorant Garamond',serif`;
    ctx.fillStyle='rgba(255,255,255,0.42)';
    ctx.fillText('Нет ходов', W/2, GY+GROWS*CELL/2-24);
    if(shuffles>0){
      const bx=W/2-68,by=GY+GROWS*CELL/2+2,bw=136,bh=38;
      ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,10);
      ctx.fillStyle='rgba(255,215,0,0.12)'; ctx.fill();
      ctx.strokeStyle='rgba(255,215,0,0.45)'; ctx.lineWidth=1; ctx.stroke();
      ctx.font=`200 10px 'Inter',sans-serif`;
      ctx.fillStyle='rgba(255,215,0,0.85)';
      ctx.fillText(`ПЕРЕМЕШАТЬ  ·  ${shuffles} из 3`,W/2,by+bh/2);
    }
  }

  // Warn flash (invalid swap)
  if(warnT>0){
    ctx.fillStyle=`rgba(255,60,60,${warnT*0.12})`;
    ctx.fillRect(GX,GY,GCOLS*CELL,GROWS*CELL);
  }
}

function drawHUD(){
  // Top bar
  ctx.fillStyle='rgba(10,10,15,0.88)';
  ctx.fillRect(0,0,W,GY-2);

  const ty=GY/2;
  ctx.textBaseline='middle'; ctx.textAlign='center';

  // Score
  ctx.font=`200 8px 'Inter',sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillText('ОЧКИ',W/2,ty-13);
  ctx.font=`300 ${Math.min(24,HUD_T*0.38)}px 'Cormorant Garamond',serif`;
  ctx.fillStyle='rgba(255,255,255,0.65)';
  ctx.fillText(score,W/2,ty+5);

  // Hi
  ctx.textAlign='left';
  ctx.font=`200 7px 'Inter',sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.14)';
  ctx.fillText('РЕКОРД',GX+4,ty-10);
  ctx.font=`300 13px 'Cormorant Garamond',serif`;
  ctx.fillStyle='rgba(255,255,255,0.26)';
  ctx.fillText(hi,GX+4,ty+8);

  // Shuffles (right side)
  ctx.textAlign='right';
  ctx.font=`200 7px 'Inter',sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.14)';
  ctx.fillText('ПЕРЕМЕШАТЬ',GX+GCOLS*CELL,ty-10);
  for(let i=0;i<3;i++){
    const dx=GX+GCOLS*CELL-(2-i)*18-5;
    ctx.beginPath(); ctx.arc(dx,ty+8,5,0,Math.PI*2);
    ctx.fillStyle=i<shuffles?'rgba(255,215,0,0.6)':'rgba(255,255,255,0.07)';
    ctx.fill();
  }

  // Chain indicator
  if(chain>1){
    ctx.textAlign='center';
    ctx.font=`300 11px 'Cormorant Garamond',serif`;
    ctx.fillStyle=`rgba(255,200,50,${Math.min(1,chain*0.25)})`;
    ctx.fillText(`серия ×${chain}`,W/2,ty-13);
  }

  // Bottom bar
  const by=GY+GROWS*CELL+2;
  ctx.fillStyle='rgba(10,10,15,0.7)';
  ctx.fillRect(0,by,W,H-by);
}

function draw(dt){
  ctx.fillStyle='#0a0a0f';
  ctx.fillRect(0,0,W,H);
  if(!active)return;
  drawGrid();
  drawHUD();
  popups=popups.filter(p=>{
    p.y+=p.vy*dt; p.alpha=Math.max(0,p.alpha-dt*1.4);
    if(p.alpha<=0)return false;
    ctx.font=`300 16px 'Cormorant Garamond',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=`rgba(${p.col.startsWith('#')?hexToRgb(p.col):'255,255,255'},${p.alpha})`;
    ctx.fillStyle=ca2(p.col,p.alpha);
    ctx.fillText(p.txt,p.x,p.y);
    return true;
  });
}

function ca2(c,a){
  if(c.startsWith('#'))return ca(c,a);
  const m=c.match(/[\d.]+/g);
  return `rgba(${m[0]},${m[1]},${m[2]},${(+m[3]||1)*a})`;
}

// ── particles ─────────────────────────────────────────────────────────────
for(let i=0;i<16;i++)setTimeout(()=>{
  const p=document.createElement('div');p.className='particle';
  p.style.cssText=`left:${Math.random()*100}vw;bottom:0;--dx:${(Math.random()-.5)*50}px;animation-duration:${14+Math.random()*12}s;animation-delay:${Math.random()*12}s`;
  document.body.appendChild(p);
},i*380);

ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
</script>
