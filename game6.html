<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>НейроВикторина · Нейро × Solfeggio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;300;400&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; overflow:hidden; touch-action:none; font-family:'Inter',sans-serif; }
canvas { display:block; position:fixed; inset:0; z-index:2; }

.overlay {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(10,10,15,0.96); transition:opacity 0.7s ease;
}
.overlay.gone { opacity:0; pointer-events:none; }
.serif { font-family:'Cormorant Garamond',serif; }

.ghost-btn {
  border:1px solid rgba(255,255,255,0.16); background:transparent;
  color:rgba(255,255,255,0.55); letter-spacing:4px; text-transform:uppercase;
  cursor:pointer; transition:all 0.4s ease; font-family:'Inter',sans-serif;
  padding:15px 48px; font-size:11px; margin:5px 0;
}
.ghost-btn:hover { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.32); letter-spacing:6px; color:rgba(255,255,255,0.88); }
.ghost-btn.hi { border-color:rgba(255,255,255,0.26); color:rgba(255,255,255,0.72); font-size:12px; letter-spacing:6px; padding:17px 54px; margin-bottom:10px; }

.hud {
  position:fixed; top:0; left:0; right:0; height:56px;
  display:flex; align-items:center; justify-content:center; gap:44px;
  z-index:10; pointer-events:none;
  background:linear-gradient(to bottom,rgba(10,10,15,0.88),transparent);
}
.stat { text-align:center; }
.sl { display:block; font-size:7px; letter-spacing:3px; color:rgba(255,255,255,0.18); text-transform:uppercase; }
.sv { display:block; font-size:21px; font-weight:300; color:rgba(255,255,255,0.58); letter-spacing:2px; font-family:'Cormorant Garamond',serif; }
.lives-row { display:flex; gap:5px; align-items:center; margin-top:3px; }
.ld { width:7px; height:7px; border-radius:50%; transition:all 0.3s; }
.ld.on  { background:rgba(255,255,255,0.48); }
.ld.off { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); }

.pbtn {
  position:fixed; top:14px; right:16px; z-index:10;
  border:1px solid rgba(255,255,255,0.07); border-radius:20px;
  background:rgba(10,10,15,0.55); color:rgba(255,255,255,0.22);
  font-size:8px; letter-spacing:2px; text-transform:uppercase;
  padding:5px 12px; cursor:pointer; transition:all 0.3s; font-family:'Inter',sans-serif;
}
.pbtn:hover { color:rgba(255,255,255,0.55); border-color:rgba(255,255,255,0.16); }

.hublink {
  position:fixed; top:14px; left:16px; z-index:10;
  border:1px solid rgba(255,255,255,0.07); border-radius:20px;
  background:rgba(10,10,15,0.55); color:rgba(255,255,255,0.22);
  font-size:8px; letter-spacing:2px; text-transform:uppercase;
  padding:5px 12px; cursor:pointer; transition:all 0.3s;
  text-decoration:none; font-family:'Inter',sans-serif;
}
.hublink:hover { color:rgba(255,255,255,0.55); border-color:rgba(255,255,255,0.16); }

.particle {
  position:fixed; border-radius:50%; pointer-events:none; z-index:1;
  width:1px; height:1px; background:rgba(255,255,255,0.28);
  animation:rise linear infinite;
}
@keyframes rise {
  0%{transform:translateY(0) translateX(0);opacity:0}
  5%{opacity:1} 90%{opacity:0.25}
  100%{transform:translateY(-100vh) translateX(var(--dx,0px));opacity:0}
}
</style>
</head>
<body>

<!-- Start -->
<div class="overlay" id="oStart">
  <div style="text-align:center;margin-bottom:44px">
    <h1 class="serif" style="font-size:clamp(24px,6vw,46px);color:rgba(255,255,255,0.72);letter-spacing:.12em;font-weight:300;margin-bottom:10px">Викторина</h1>
    <p class="serif" style="font-size:clamp(11px,2.4vw,17px);color:rgba(255,255,255,0.2);letter-spacing:.3em;font-style:italic">Нейро × Solfeggio</p>
    <p style="font-size:9px;color:rgba(255,255,255,0.12);letter-spacing:3px;margin-top:18px;text-transform:uppercase">Определи группу буквы до того, как иссякнет время</p>
  </div>
  <button class="ghost-btn hi" onclick="startGame()">Начать</button>
  <a class="ghost-btn" href="hub.html" style="font-size:9px;letter-spacing:3px;padding:9px 32px;text-decoration:none;display:inline-block;text-align:center">← Все игры</a>
</div>

<!-- Pause -->
<div class="overlay gone" id="oPause">
  <h2 class="serif" style="font-size:clamp(28px,7vw,50px);color:rgba(255,255,255,0.52);letter-spacing:.15em;font-weight:300;margin-bottom:36px">Пауза</h2>
  <button class="ghost-btn hi" onclick="resumeGame()">Продолжить</button>
  <button class="ghost-btn" style="font-size:9px;letter-spacing:3px;padding:9px 30px;margin-top:4px" onclick="goStart()">← Меню</button>
</div>

<!-- Gameover -->
<div class="overlay gone" id="oGameover">
  <p style="font-size:8px;color:rgba(255,255,255,0.16);letter-spacing:5px;text-transform:uppercase;margin-bottom:14px">Время вышло</p>
  <h2 class="serif" style="font-size:clamp(28px,7vw,52px);color:rgba(255,255,255,0.6);letter-spacing:.12em;font-weight:300;margin-bottom:10px">Финал</h2>
  <p class="serif" id="goScore" style="font-size:clamp(16px,3.5vw,26px);color:rgba(255,255,255,0.28);letter-spacing:4px;font-style:italic;margin-bottom:6px"></p>
  <p id="goHi" style="font-size:9px;color:rgba(255,255,255,0.13);letter-spacing:3px;margin-bottom:38px"></p>
  <button class="ghost-btn hi" onclick="startGame()">Снова</button>
  <button class="ghost-btn" style="font-size:9px;letter-spacing:3px;padding:9px 30px;margin-top:4px" onclick="goStart()">← Меню</button>
</div>

<div class="hud" id="hud" style="display:none">
  <div class="stat"><span class="sl">Счёт</span><span class="sv" id="hScore">0</span></div>
  <div class="stat"><span class="sl" style="margin-bottom:4px">Жизни</span><div class="lives-row" id="hLives"></div></div>
  <div class="stat"><span class="sl">Серия</span><span class="sv" id="hCombo">—</span></div>
</div>
<button class="pbtn" id="pBtn" style="display:none" onclick="pauseGame()">II пауза</button>
<a class="hublink" href="hub.html" id="hubLnk" style="display:none">← игры</a>

<canvas id="c"></canvas>

<script>
'use strict';

// ── polyfill ──────────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    const R=Array.isArray(r)?r[0]||0:r||0;
    this.moveTo(x+R,y);this.lineTo(x+w-R,y);this.arcTo(x+w,y,x+w,y+R,R);
    this.lineTo(x+w,y+h-R);this.arcTo(x+w,y+h,x+w-R,y+h,R);
    this.lineTo(x+R,y+h);this.arcTo(x,y+h,x,y+h-R,R);
    this.lineTo(x,y+R);this.arcTo(x,y,x+R,y,R);this.closePath();
  };
}

// ── data ──────────────────────────────────────────────────
const GROUPS = {
  1:['И','С','Э'],     2:['А','Й','П','Т'],
  3:['Б','З','М','Ю'], 4:['В','К','Ф','Я'],
  5:['Д','Л','Х','Ы'], 6:['Е','О','Ц','Ь'],
  7:['Ё','Н','Ъ'],     8:['Г','У','Ч','Щ'],
  9:['Ж','Р','Ш']
};
const CLR = {
  1:'#ff5f5f',2:'#ffd700',3:'#2ecc71',4:'#1ab8b8',
  5:'#4d88ff',6:'#7dce82',7:'#cccccc',8:'#ff4d8f',9:'#9b59b6'
};
const SOL = {
  1:{hz:174,name:'Foundation'},2:{hz:285,name:'Quantum'},
  3:{hz:369,name:'Universe'}, 4:{hz:417,name:'Transmutation'},
  5:{hz:528,name:'Miracle'},  6:{hz:639,name:'Connection'},
  7:{hz:741,name:'Expression'},8:{hz:852,name:'Intuition'},
  9:{hz:963,name:'Divine'}
};
const INFO = {};
for (const [c,arr] of Object.entries(GROUPS))
  arr.forEach((l,i) => INFO[l]={code:+c,si:i%4});

function ca(hex,a) {
  return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a.toFixed(3)})`;
}

// ── canvas ────────────────────────────────────────────────
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
window.addEventListener('resize',resize); resize();

// ── audio ─────────────────────────────────────────────────
let AC=null;
function initAudio(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}
function playTone(code,dur=2){
  if(!AC)return;const hz=SOL[code].hz;
  [[1,.24],[2,.06]].forEach(([m,v])=>{
    const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=hz*m;
    const t=AC.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.3);
    g.gain.setValueAtTime(v,t+dur-.4);g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+dur);
  });
}
function playWrong(){
  if(!AC)return;const o=AC.createOscillator(),g=AC.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(140,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(48,AC.currentTime+.22);
  const t=AC.currentTime;g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);
  o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+.32);
}

// ── state ─────────────────────────────────────────────────
let score=0,hi=+localStorage.getItem('quiz6_hi')||0,combo=0,lives=3;
let active=false,paused=false,animId=0;

// question
let qCh,qCode,qSi,qOpts; // current letter, its code, shape index, 4 option codes
let timer=1;              // 0..1 remaining
let timerDur=3;           // seconds per question
let phase='idle';         // idle|question|feedok|feedwrong
let phaseT=0;             // phase timer countdown
let chosen=null;          // chosen option code (null=timeout)

// visuals
let effects=[],popups=[];
let letterScale=0,letterTarget=1; // entrance zoom

// ── layout ────────────────────────────────────────────────
const HUD_H=56;
function lc(){return{x:W/2,y:HUD_H+(H-HUD_H)*0.37};}  // letter center
function letterR(){return Math.min(W*.14,H*.14,58);}

function btnRect(i){
  const gap=Math.min(10,W*.012);
  const bw=Math.min(118,(W-32-gap*3)/4);
  const bh=Math.min(96,H*.145);
  const total=4*bw+3*gap;
  const x0=(W-total)/2;
  const y=H*.74;
  return{x:x0+i*(bw+gap),y,w:bw,h:bh};
}
function timerBar(){
  const bw=Math.min(W*.6,360);
  return{x:(W-bw)/2,y:lc().y+letterR()+20,w:bw,h:4};
}

// ── question ──────────────────────────────────────────────
function genQ(){
  qCode=Math.ceil(Math.random()*9);
  const arr=GROUPS[qCode];
  qCh=arr[Math.floor(Math.random()*arr.length)];
  qSi=INFO[qCh].si;
  const wrong=[];
  while(wrong.length<3){const c=Math.ceil(Math.random()*9);if(c!==qCode&&!wrong.includes(c))wrong.push(c);}
  qOpts=[qCode,...wrong].sort(()=>Math.random()-.5);
  timer=1; timerDur=Math.max(1.4,3-.17*(Math.floor(score/800)));
  chosen=null; letterScale=0; letterTarget=1;
  phase='question';
}

// ── draw letter ───────────────────────────────────────────
function drawLetter(x,y,r,ch,code,si,col,alpha){
  ctx.save(); ctx.translate(x,y); ctx.globalAlpha=alpha;
  ctx.shadowColor=col; ctx.shadowBlur=24;
  ctx.fillStyle=ca(col,.7);
  ctx.beginPath();
  if(si===0) ctx.arc(0,0,r,0,Math.PI*2);
  else if(si===1){const rr=r*.9;ctx.roundRect(-rr,-rr,rr*2,rr*2,rr*.22);}
  else if(si===2){ctx.moveTo(0,-r);ctx.lineTo(r*.88,r*.62);ctx.lineTo(-r*.88,r*.62);ctx.closePath();}
  else{ctx.moveTo(0,-r);ctx.lineTo(r*.72,0);ctx.lineTo(0,r);ctx.lineTo(-r*.72,0);ctx.closePath();}
  ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1; ctx.stroke();
  const fs=Math.max(14,r*.95);
  ctx.font=`bold ${fs}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,.72)'; ctx.fillText(ch,1,1);
  ctx.fillStyle='#fff'; ctx.fillText(ch,0,0);
  ctx.restore();
}

// ── draw answer buttons ───────────────────────────────────
function drawButtons(feedOk, feedWrong){
  for(let i=0;i<4;i++){
    const code=qOpts[i];
    const{x,y,w,h}=btnRect(i);
    const col=CLR[code];
    const isChosen=chosen===code;
    const isCorrect=code===qCode;

    // state-based brightness
    let bgA=.06, borderA=.1, colorA=.4;
    if(phase==='feedok'  && isCorrect){bgA=.3;borderA=.7;colorA=.95;}
    if(phase==='feedwrong'){
      if(isChosen && !isCorrect){bgA=.18;borderA=.5;colorA=.8;}
      if(isCorrect){bgA=.22;borderA=.6;colorA=.9;}
    }

    // bg
    ctx.beginPath(); ctx.roundRect(x,y,w,h,10);
    const g=ctx.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,ca(col,bgA*.6));g.addColorStop(1,ca(col,bgA));
    ctx.fillStyle=g; ctx.fill();
    // border
    ctx.strokeStyle=ca(col,borderA); ctx.lineWidth=1.2; ctx.stroke();

    // top accent line
    ctx.fillStyle=ca(col,borderA*.9);
    ctx.fillRect(x+10,y,w-20,1.5);

    // wrong mark
    if(phase==='feedwrong'&&isChosen&&!isCorrect){
      ctx.fillStyle='rgba(255,60,60,.25)';
      ctx.beginPath();ctx.roundRect(x,y,w,h,10);ctx.fill();
    }

    // code number
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.font=`300 ${Math.min(22,w*.22)}px 'Cormorant Garamond',serif`;
    ctx.fillStyle=ca(col,colorA);
    ctx.fillText(String(code),x+w/2,y+10);

    // frequency name
    ctx.font=`200 ${Math.max(7,Math.min(9,w*.1))}px 'Inter',sans-serif`;
    ctx.fillStyle=`rgba(255,255,255,${.12+bgA*.4})`;
    ctx.fillText(SOL[code].name,x+w/2,y+36);

    // sample letters
    const letters=GROUPS[code].slice(0,3).join(' · ');
    ctx.font=`200 ${Math.max(7,Math.min(9,w*.1))}px 'Inter',sans-serif`;
    ctx.fillStyle=`rgba(255,255,255,${.1+bgA*.3})`;
    ctx.fillText(letters,x+w/2,y+52);

    // hz
    ctx.font=`200 ${Math.max(6,Math.min(8,w*.09))}px 'Inter',sans-serif`;
    ctx.fillStyle=`rgba(255,255,255,${.06+bgA*.2})`;
    ctx.fillText(`${SOL[code].hz} Hz`,x+w/2,y+68);
  }
}

// ── effects ───────────────────────────────────────────────
function addBurst(x,y,col){
  effects.push({type:'burst',x,y,col,alpha:1,
    pts:Array.from({length:12},(_,i)=>({a:(i/12)*Math.PI*2,r:0,spd:60+Math.random()*80}))});
  effects.push({type:'ring',x,y,r:0,maxR:90,alpha:1,col,spd:230});
}
function addPopup(x,y,txt,col){popups.push({x,y,txt,col,alpha:1,vy:-50});}

function drawFx(dt){
  effects=effects.filter(e=>{
    if(e.type==='ring'){e.r+=e.spd*dt;e.alpha=Math.max(0,1-e.r/e.maxR);
      if(e.alpha<=0)return false;
      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
      ctx.strokeStyle=ca(e.col,e.alpha*.7);ctx.lineWidth=1.5;ctx.stroke();
    }else{e.alpha-=dt*1.8;if(e.alpha<=0)return false;
      e.pts.forEach(p=>{p.r+=p.spd*dt;
        ctx.beginPath();ctx.arc(e.x+Math.cos(p.a)*p.r,e.y+Math.sin(p.a)*p.r,2,0,Math.PI*2);
        ctx.fillStyle=ca(e.col,e.alpha);ctx.fill();});
    }
    return e.alpha>0;
  });
  popups=popups.filter(p=>{
    p.y+=p.vy*dt;p.alpha=Math.max(0,p.alpha-dt*1.3);if(p.alpha<=0)return false;
    ctx.font=`300 18px 'Cormorant Garamond',serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=ca(p.col,p.alpha);ctx.fillText(p.txt,p.x,p.y);
    return true;
  });
}

// ── main loop ─────────────────────────────────────────────
let prevT=0;
function loop(ts){
  if(!active||paused)return;
  const dt=Math.min((ts-prevT)/1000,.05);prevT=ts;

  ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);

  letterScale+=(letterTarget-letterScale)*Math.min(1,dt*12);
  const{x:lx,y:ly}=lc();
  const r=letterR()*letterScale;

  if(phase==='question'){
    // timer
    timer-=dt/timerDur;
    if(timer<=0){timer=0;handleAnswer(null);}

    // draw letter
    if(r>2) drawLetter(lx,ly,r,qCh,qCode,qSi,CLR[qCode],1);

    // timer bar
    const{x:tx,y:ty,w:tw,h:th}=timerBar();
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.beginPath();ctx.roundRect(tx,ty,tw,th,th/2);ctx.fill();
    const pct=Math.max(0,timer);
    const col=pct>.5?CLR[qCode]:pct>.25?'#ffd700':'#ff5f5f';
    if(pct>0){ctx.fillStyle=ca(col,.65+(pct<.3?Math.sin(Date.now()*.015)*.3:0));
      ctx.beginPath();ctx.roundRect(tx,ty,tw*pct,th,th/2);ctx.fill();}

    drawButtons(false,false);

  }else if(phase==='feedok'){
    phaseT-=dt;
    if(r>2) drawLetter(lx,ly,r,qCh,qCode,qSi,CLR[qCode],1);
    drawButtons(true,false);
    if(phaseT<=0)genQ();

  }else if(phase==='feedwrong'){
    phaseT-=dt;
    // show correct group info
    if(r>2) drawLetter(lx,ly,r,qCh,qCode,qSi,CLR[qCode],1);
    drawButtons(false,true);

    // reveal: "код X · группа: А Й П Т"
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`300 ${Math.min(14,W*.036)}px 'Cormorant Garamond',serif`;
    ctx.fillStyle=`rgba(255,255,255,${Math.min(.55,(.8-phaseT)*1.5)})`;
    ctx.fillText(`код ${qCode}  ·  ${GROUPS[qCode].join(' · ')}  ·  ${SOL[qCode].name}`,lx,ly+r+42);

    if(phaseT<=0){
      if(lives<=0){gameOver();return;}
      genQ();
    }
  }else if(phase==='idle'){
    phaseT-=dt;if(phaseT<=0)genQ();
  }

  drawFx(dt);
  animId=requestAnimationFrame(loop);
}

// ── answer ────────────────────────────────────────────────
function handleAnswer(code){
  if(phase!=='question')return;
  chosen=code;

  if(code===qCode){
    const pts=100*(1+Math.floor(combo/3))+Math.round(50*timer);
    score+=pts; combo++;
    if(score>hi){hi=score;localStorage.setItem('quiz6_hi',hi);}
    playTone(qCode,1.8);
    addBurst(lc().x,lc().y,CLR[qCode]);
    addPopup(lc().x,lc().y-letterR()-18,`+${pts}`,CLR[qCode]);
    phase='feedok'; phaseT=.75;
  }else{
    lives--; combo=0;
    playWrong();
    phase='feedwrong'; phaseT=1.3;
  }
  updateHUD();
}

// ── hud ───────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('hScore').textContent=score;
  document.getElementById('hCombo').textContent=combo>=2?`×${Math.min(5,1+Math.floor(combo/3))}`:'—';
  const row=document.getElementById('hLives'); row.innerHTML='';
  for(let i=0;i<3;i++){const d=document.createElement('div');d.className='ld '+(i<lives?'on':'off');row.appendChild(d);}
}

// ── screens ───────────────────────────────────────────────
const OVS=['oStart','oPause','oGameover'];
const hideAll=()=>OVS.forEach(id=>document.getElementById(id).classList.add('gone'));
const show=id=>document.getElementById(id).classList.remove('gone');

function startGame(){
  initAudio();
  score=0;combo=0;lives=3;effects=[];popups=[];
  active=true;paused=false;
  updateHUD();
  document.getElementById('hud').style.display='flex';
  document.getElementById('pBtn').style.display='block';
  document.getElementById('hubLnk').style.display='block';
  hideAll();
  ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
  phase='idle';phaseT=.3;
  prevT=performance.now();
  if(animId)cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}
function gameOver(){
  active=false;if(animId)cancelAnimationFrame(animId);
  document.getElementById('hud').style.display='none';
  document.getElementById('pBtn').style.display='none';
  document.getElementById('goScore').textContent=`${score} очков`;
  document.getElementById('goHi').textContent=`Рекорд: ${hi}`;
  show('oGameover');
}
function pauseGame(){if(!active)return;paused=true;show('oPause');}
function resumeGame(){if(!active)return;paused=false;hideAll();prevT=performance.now();animId=requestAnimationFrame(loop);}
function goStart(){active=false;paused=false;if(animId)cancelAnimationFrame(animId);document.getElementById('hud').style.display='none';document.getElementById('pBtn').style.display='none';document.getElementById('hubLnk').style.display='none';hideAll();show('oStart');}

// ── input ─────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(!active||paused){if(e.key==='Escape')goStart();return;}
  const k=parseInt(e.key);
  if(k>=1&&k<=9){handleAnswer(k);e.preventDefault();}
  else if(e.key==='p'||e.key==='P'||e.key==='Escape') pauseGame();
});

canvas.addEventListener('click',e=>{
  if(!active||paused)return;
  if(phase!=='question')return;
  for(let i=0;i<4;i++){
    const{x,y,w,h}=btnRect(i);
    if(e.clientX>=x&&e.clientX<=x+w&&e.clientY>=y&&e.clientY<=y+h){handleAnswer(qOpts[i]);break;}
  }
});

let tx0=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();tx0={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();if(!tx0||!active||paused){tx0=null;return;}
  const dx=e.changedTouches[0].clientX-tx0.x,dy=e.changedTouches[0].clientY-tx0.y;
  if(Math.abs(dx)<20&&Math.abs(dy)<20&&phase==='question'){
    const cx=e.changedTouches[0].clientX,cy=e.changedTouches[0].clientY;
    for(let i=0;i<4;i++){const{x,y,w,h}=btnRect(i);if(cx>=x&&cx<=x+w&&cy>=y&&cy<=y+h){handleAnswer(qOpts[i]);break;}}
  }
  tx0=null;
},{passive:false});

// ── particles ─────────────────────────────────────────────
for(let i=0;i<22;i++) setTimeout(()=>{
  const p=document.createElement('div');p.className='particle';
  p.style.cssText=`left:${Math.random()*100}vw;bottom:0;--dx:${(Math.random()-.5)*50}px;animation-duration:${13+Math.random()*14}s;animation-delay:${Math.random()*12}s`;
  document.body.appendChild(p);
},i*300);

ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
</script>
</body>
</html>
